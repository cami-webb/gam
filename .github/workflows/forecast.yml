name: GAM Forecast

on:
  workflow_dispatch:   # manual trigger (tree target)
  # Uncomment below when adding daily targets (coastal/urban):
  # schedule:
  #   - cron: "0 8 * * *"

jobs:
  forecast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R packages
        run: |
          Rscript -e "install.packages(c('aws.s3','yaml','readr','dplyr','mgcv'), repos='https://cloud.r-project.org')"

      - name: Run forecast
        env:
          OSN_KEY:    ${{ secrets.OSN_KEY }}
          OSN_SECRET: ${{ secrets.OSN_SECRET }}
        run: Rscript R/run_forecast.R
